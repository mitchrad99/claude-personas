name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Scan for secrets
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            LOG_OPTS="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            # First push to a new branch — scan just the tip commit
            LOG_OPTS="HEAD~1..HEAD"
          else
            LOG_OPTS="${{ github.event.before }}..${{ github.sha }}"
          fi
          gitleaks detect --source . --log-opts="$LOG_OPTS" --no-banner

  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: crm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            crm/requirements.txt
            crm/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test
        env:
          # Real secrets are never used — conftest.py points at in-memory SQLite.
          # CRM_PASSWORD is required by app.py at import time.
          CRM_PASSWORD: ci-test-password
        run: pytest --cov=. --cov-report=term-missing
